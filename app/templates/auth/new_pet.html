{% extends "base.html" %}

{% block title %}{{ title }} | Paws Rescue Center{% endblock %}

{% block content %}
    <section class="page-header">
        <h1>{{ title }}</h1>
        <p>Add a new adoptable pet to the rescue center database.</p>
    </section>

    <section class="content-section">
        <form class="form" method="POST">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>

            <label for="species">Species</label>
            <input id="species" name="species" type="text" required>

            <label for="breed">Breed</label>
            <input id="breed" name="breed" type="text" required>

            <label for="age">Age</label>
            <input id="age" name="age" type="number" min="0" required>

            <label class="checkbox-label">
                <input name="is_available" type="checkbox" checked>
                Available for adoption
            </label>

            <button class="button" type="submit">Add Pet</button>
        </form>
    </section>
{% endblock %}
